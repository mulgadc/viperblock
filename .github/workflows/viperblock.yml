name: Build and Test

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - Makefile
      - .github/workflows/viperblock.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Install nbdkit dependencies
        run: sudo apt-get update && sudo apt-get install -y nbdkit nbdkit-plugin-dev pkg-config

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache-dependency-path: "go.sum"
          go-version-file: "go.mod"

      - name: Build Viperblock
        run: make build

      - name: Run Tests with Coverage
        run: make test-cover

      - name: Check Diff Coverage
        run: scripts/diff-coverage.sh coverage.out --base HEAD~1

  integration:
    name: Integration Tests
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache-dependency-path: "go.sum"
          go-version-file: "go.mod"

      - name: Run Integration Tests
        run: make test-integration

  race_detection:
    name: Race Detection
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache-dependency-path: "go.sum"
          go-version-file: "go.mod"

      - name: Run Tests with Race Detector
        run: make test-race

  lint_and_security:
    name: Lint and Security
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          cache-dependency-path: "go.sum"
          go-version-file: "go.mod"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Govulncheck
        run: make govulncheck
